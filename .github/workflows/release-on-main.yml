name: Release On Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  bump_version:
    name: Bump Version And Tag
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version in workspace Cargo.toml
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(grep -m1 '^version = "' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          NEW_TAG="v${NEW_VERSION}"

          sed -i.bak -E "0,/^version = \".*\"/s//version = \"${NEW_VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump + tag
        shell: bash
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml
          git commit -m "chore(release): bump version to ${TAG} [skip ci]"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin HEAD:main --follow-tags

  build:
    name: Build ${{ matrix.name }}
    needs: bump_version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-14
            os_id: macos-arm64
            archive_name: atc-book-${{ needs.bump_version.outputs.tag }}-macos-arm64.tar.gz
          - name: Windows x64
            runner: windows-2022
            os_id: windows-x64
            archive_name: atc-book-${{ needs.bump_version.outputs.tag }}-windows-x64.zip

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump_version.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL https://dioxus.dev/install.sh | sh
          echo "$HOME/.dioxus/bin" >> "$GITHUB_PATH"

      - name: Build release bundle
        shell: bash
        run: dx build --release --package atc-book

      - name: Sign macOS app (optional notarization)
        if: matrix.os_id == 'macos-arm64'
        shell: bash
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          APP_PATH="$(find target/dx/atc-book/release -maxdepth 4 -name "*.app" | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found under target/dx/atc-book/release" >&2
            exit 1
          fi

          # Paid path: Developer ID signature + notarization
          if [ -n "${MACOS_CERT_P12}" ] && [ -n "${MACOS_SIGNING_IDENTITY}" ] && [ -n "${APPLE_ID}" ] && [ -n "${APPLE_TEAM_ID}" ] && [ -n "${APPLE_APP_PASSWORD}" ]; then
            KEYCHAIN_PASSWORD="temp-keychain-pass"
            echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

            codesign --force --deep --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" "$APP_PATH"
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            xcrun notarytool submit "$APP_PATH" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait
            xcrun stapler staple "$APP_PATH"
            echo "Notarized build produced"
            echo "SIGNING_MODE=notarized" >> "$GITHUB_ENV"
          else
            # Free path: ad-hoc signature only (still untrusted by Gatekeeper when downloaded).
            codesign --force --deep --sign - "$APP_PATH"
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            echo "Ad-hoc signed build produced (no notarization)"
            echo "SIGNING_MODE=ad-hoc" >> "$GITHUB_ENV"
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Package macOS artifact
        if: matrix.os_id == 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          APP_PATH="${APP_PATH:-}"
          if [ -z "$APP_PATH" ]; then
            APP_PATH="$(find target/dx/atc-book/release -maxdepth 4 -name "*.app" | head -n 1)"
          fi
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found under target/dx/atc-book/release" >&2
            exit 1
          fi
          cp -R "$APP_PATH" dist/AtcBook.app
          if [ "${SIGNING_MODE:-ad-hoc}" = "notarized" ]; then
            printf '%s\n' \
              'This macOS app is signed and notarized.' \
              '' \
              'If macOS still warns on first launch:' \
              '1. Right-click AtcBook.app and choose Open' \
              '2. Confirm Open' \
              > dist/README-macos.txt
          else
            printf '%s\n' \
              'This macOS app is ad-hoc signed (not notarized).' \
              'macOS Gatekeeper may block it when downloaded from the internet.' \
              '' \
              'To run it locally after extraction:' \
              '' \
              '  xattr -dr com.apple.quarantine AtcBook.app' \
              '' \
              'Alternative:' \
              '1. Right-click AtcBook.app and choose Open' \
              '2. Confirm Open' \
              > dist/README-macos.txt
          fi
          tar -czf "${{ matrix.archive_name }}" -C dist AtcBook.app README-macos.txt

      - name: Package Windows artifact
        if: matrix.os_id == 'windows-x64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $exe = Get-ChildItem -Path "target/dx/atc-book/release" -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No .exe found under target/dx/atc-book/release" }
          Copy-Item $exe.FullName "dist/atc-book.exe"
          Compress-Archive -Path "dist/atc-book.exe" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os_id }}
          path: ${{ matrix.archive_name }}

  release:
    name: Publish GitHub Release
    needs:
      - bump_version
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump_version.outputs.tag }}
          name: ${{ needs.bump_version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/release-macos-arm64/*
            artifacts/release-windows-x64/*